name: ROS 2 CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - name: Setup ROS 2 Humble
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: humble

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsuitesparse-dev libboost-all-dev libeigen3-dev libglew-dev python3-pip
        rosdep update
        rosdep install -i --from-path src --rosdistro humble -y || true

    - name: Build Workspace
      run: |
        # Building the drone_core and other native packages
        # (Excluding ORB_SLAM3 if it takes too long for CI, or include it if needed)
        source /opt/ros/humble/setup.bash
        colcon build --cmake-args -DCMAKE_BUILD_TYPE=Release --packages-skip orbslam3

    - name: Run Tests
      run: |
        source /opt/ros/humble/setup.bash
        source install/setup.bash
        colcon test
        colcon test-result --all
