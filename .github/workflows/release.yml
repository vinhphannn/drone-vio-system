name: Auto Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Loại phiên bản (patch: sửa lỗi, minor: thêm tính năng nhỏ, major: thay đổi lớn)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      custom_notes:
        description: 'Ghi chú thêm cho phiên bản này (nếu có)'
        required: false
        type: string

jobs:
  build-and-release:
    name: Build & Auto Release
    runs-on: ubuntu-22.04
    permissions:
      contents: write # Quyền cần thiết để tạo Tag và Release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Cần thiết để lấy toàn bộ lịch sử tag cũ

      - name: Tự động Tăng Version & Tạo Tag (Auto Bump Version)
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ github.event.inputs.bump_type }}
          # Tính năng này sẽ tự dò tag gần nhất (VD: v1.0.1) 
          # và tự động cộng lên (VD: patch -> v1.0.2)

      - name: Create ROS 2 Source Archive
        run: |
          # Dọn dẹp rác trước khi đóng gói
          rm -rf build/ install/ log/ calib_bag/ *.bag src/ORB_SLAM3/build src/ORB_SLAM3/lib
          zip -r drone_vio_ros2_workspace.zip . -x "*.git*" ".github/*"

      - name: Create Firmware Archive
        run: |
          cd firmware
          zip -r ../stm32_imu_firmware.zip . -x "*.git*"

      - name: Lấy thời gian hiện tại
        id: date
        run: echo "current_date=$(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_ENV

      - name: Create Release & Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: |
            ## 🚀 Drone VIO System - Phiên bản ${{ steps.tag_version.outputs.new_tag }}
            📅 **Thời gian phát hành:** ${{ env.current_date }}
            
            ### 📝 Tác giả ghi chú
            ${{ github.event.inputs.custom_notes || 'Không có ghi chú thêm.' }}
            
            ---
            
            ### 🔄 Lịch sử thay đổi (Auto-generated Changelog)
            ${{ steps.tag_version.outputs.changelog }}
            
            ### 📦 Assets included:
            - `drone_vio_ros2_workspace.zip`: Source code ROS2 Humble sạch sẽ, sẵn sàng build.
            - `stm32_imu_firmware.zip`: Source code cho Vi điều khiển STM32.
          draft: false
          prerelease: false
          files: |
            drone_vio_ros2_workspace.zip
            stm32_imu_firmware.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
