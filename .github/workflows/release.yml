name: Auto Release

on:
  push:
    # Workflow này CHỈ chạy khi bạn push một tag có định dạng v1.0.0, v2.1...
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    permissions:
      contents: write # Cấp quyền cho GitHub Actions tạo Release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Create ROS 2 Source Archive
        run: |
          # Xóa các file rác không cần thiết trước khi nén
          rm -rf build/ install/ log/ calib_bag/ *.bag src/ORB_SLAM3/build src/ORB_SLAM3/lib
          # Nén toàn bộ workspace
          zip -r drone_vio_ros2_workspace.zip . -x "*.git*" ".github/*"

      - name: Create Firmware Archive
        run: |
          # Vào thư mục firmware và nén lại
          cd firmware
          zip -r ../stm32_imu_firmware.zip . -x "*.git*"

      - name: Create Release & Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## 🚀 Drone VIO System ${{ github.ref_name }}
            
            This release is automatically generated by GitHub Actions.
            
            ### Assets included:
            - `drone_vio_ros2_workspace.zip`: Clean ROS 2 Humble workspace ready to build.
            - `stm32_imu_firmware.zip`: STM32 MCU firmware for BMI160 sensor reading.
            
            ### How to use:
            1. Download `drone_vio_ros2_workspace.zip`
            2. Unzip and run `colcon build --cmake-args -DCMAKE_BUILD_TYPE=Release`
          draft: false
          prerelease: false
          files: |
            drone_vio_ros2_workspace.zip
            stm32_imu_firmware.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
